# nginx site config for mattserwinowski.com
#
# Mounted into the nginx:alpine container at /etc/nginx/conf.d/default.conf
# (mount defined in the webserver stack's compose.yaml, managed by the nasctl
# toolkit). This enforces what robots.txt only *requests*: it
# hard-blocks AI/scraper user-agents and rate-limits aggressive clients.
#
# Stock nginx:alpine includes this file inside the http {} block, so the
# map and limit_req_zone directives below are valid here.

# Map known AI-training / scraper user agents to a block flag.
# Matches are case-insensitive (~*) substrings of the User-Agent header.
map $http_user_agent $blocked_ua {
    default                 0;

    # OpenAI
    "~*GPTBot"              1;
    "~*OAI-SearchBot"       1;

    # Anthropic
    "~*ClaudeBot"           1;
    "~*Claude-Web"          1;
    "~*anthropic-ai"        1;

    # Google AI (Gemini training — does NOT match Googlebot search crawler)
    "~*Google-Extended"     1;

    # Common Crawl (feeds many LLM datasets)
    "~*CCBot"               1;

    # Perplexity (training crawler)
    "~*PerplexityBot"       1;

    # ByteDance / TikTok — notorious for ignoring robots.txt
    "~*Bytespider"          1;

    # Apple Intelligence training (does NOT match Applebot search crawler)
    "~*Applebot-Extended"   1;

    # Meta AI
    "~*Meta-ExternalAgent"  1;
    "~*FacebookBot"         1;

    # Amazon
    "~*Amazonbot"           1;

    # Misc AI / aggressive SEO scrapers
    "~*cohere-ai"           1;
    "~*Diffbot"             1;
    "~*Omgilibot"           1;
    "~*YouBot"              1;
    "~*ImagesiftBot"        1;
    "~*DataForSeoBot"       1;
    "~*MJ12bot"             1;
    "~*AhrefsBot"           1;
    "~*SemrushBot"          1;
    "~*DotBot"              1;

    # Empty user-agent — almost always a script/scraper
    ""                      1;

    # NOTE: user-triggered fetchers (ChatGPT-User, Perplexity-User) are left
    # OUT of this hard-block list on purpose — blocking them costs citations
    # when a human explicitly asks an assistant about your page. They are
    # still disallowed in robots.txt. Move them here if you want them 403'd.
}

# Per-IP rate-limit zone. 10 req/s sustained is generous for a static site;
# a real browser loading a page (HTML + CSS + a few images) fits in the burst.
limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- Layer 2 enforcement: hard-block AI / scraper user agents ---
    if ($blocked_ua) {
        return 403;
    }

    # --- Rate limiting: absorb bursts, 429 the floods ---
    limit_req        zone=perip burst=20 nodelay;
    limit_req_status 429;

    # Astro emits directory-style routes (about/index.html); fall back to
    # the .html variant, then a real 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # Hashed, immutable assets Astro emits under /_astro/ — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
