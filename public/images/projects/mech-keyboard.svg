<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1c1f2b"/>
  <!-- Simplified split keyboard shape -->
  <rect x="100" y="120" width="80" height="60" rx="6" fill="none" stroke="#60a5fa" stroke-width="2" transform="rotate(-10, 140, 150)"/>
  <rect x="220" y="120" width="80" height="60" rx="6" fill="none" stroke="#60a5fa" stroke-width="2" transform="rotate(10, 260, 150)"/>
  <!-- Key dots -->
  <circle cx="120" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="135" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="150" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="240" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="255" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="270" cy="140" r="4" fill="#60a5fa" opacity="0.5"/>
  <text x="200" y="220" text-anchor="middle" fill="#9ca3af" font-family="sans-serif" font-size="14">Mechanical Keyboard</text>
</svg>
